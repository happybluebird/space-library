    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- API Utilities ---
        const getApiKey = (key) => localStorage.getItem(key) || '';
        const saveApiKey = (key, value) => localStorage.setItem(key, value);

        const fetchNASAApod = async (date) => {
            const apiKey = getApiKey('NASA_API_KEY');
            if (!apiKey) throw new Error('NASA_KEY_MISSING');
            const dateParam = date ? `&date=${date}` : '';
            const res = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${apiKey}${dateParam}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.msg || 'NASA_FETCH_FAILED');
            }
            return res.json();
        };

        const fetchClaudeKorean = async (apodData, mode) => {
            const apiKey = getApiKey('CLAUDE_API_KEY');
            if (!apiKey) throw new Error('CLAUDE_KEY_MISSING');
            const prompt = mode === 'birthday'
                ? `NASA 오늘의 우주 사진 정보:\n제목: ${apodData.title}\n날짜: ${apodData.date}\n설명: ${apodData.explanation}\n\n이 날의 우주 사진을 바탕으로 생일 축하 메시지를 한국어로 작성해주세요. 우주적 관점에서 이 날의 특별함을 강조하며 따뜻하고 감동적인 메시지를 250자 내외로 써주세요.`
                : `NASA 오늘의 우주 사진 정보:\n제목: ${apodData.title}\n날짜: ${apodData.date}\n설명: ${apodData.explanation}\n\n이 우주 사진에 대한 한국어 해설을 작성해주세요. 천문학적 내용을 일반인도 이해하기 쉽게 설명하고, 우주의 경이로움을 담아 250자 내외로 써주세요.`;
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 600,
                    messages: [{ role: 'user', content: prompt }]
                })
            });
            if (!res.ok) {
                const err = await res.json().catch(function() { return {}; });
                throw new Error((err.error && err.error.message) || 'CLAUDE_FETCH_FAILED');
            }
            const data = await res.json();
            return data.content[0].text;
        };

        // --- Common Components ---

            const FALLBACK_BIRTHDAY  = '당신이 태어난 그 순간, 우주는 수십억 년의 여정 끝에 이 아름다운 장면을 완성했습니다. 별빛이 당신의 탄생을 축하하듯 반짝였고, 광대한 우주는 당신이라는 존재를 이 세상에 맞이하기 위해 준비되어 있었습니다. 생일을 진심으로 축하합니다.';

            const [commentaryLoading, setCommentaryLoading] = useState(false);

            const [birthdayLoading, setBirthdayLoading] = useState(false);
            const [birthdayMsg, setBirthdayMsg] = useState(null);
            const [birthdayMsgLoading, setBirthdayMsgLoading] = useState(false);
            const [birthdayError, setBirthdayError] = useState(null);

            const loadToday = async () => {
                setApodLoading(true); setApodError(null); setCommentary(null);
                try { const d = await fetchNASAApod(); setApod(d); }
                catch (e) { setApodError(e.message); }
                finally { setApodLoading(false); }

            useEffect(function() { if (getApiKey('NASA_API_KEY')) loadToday(); }, []);

            const generateCommentary = async () => {
                if (!apod) return;
                setCommentaryLoading(true);
                try { setCommentary(await fetchClaudeKorean(apod, 'commentary')); }

                try { setBirthdayApod(await fetchNASAApod(birthDate)); }

        const ApodImage = ({ apod }) => {
            const [imgSrc, setImgSrc] = useState(apod.url);
            const [fallback, setFallback] = useState(false);
            const retried = React.useRef(false);

            const onError = () => {
                if (!retried.current) {
                    retried.current = true;
                    var q = encodeURIComponent(apod.title);
                    fetch('https://images-api.nasa.gov/search?q=' + q + '&media_type=image')
                        .then(function(r) { return r.json(); })
                        .then(function(d) {
                            var its = d.collection && d.collection.items;
                            var lnk = its && its[0] && its[0].links && its[0].links[0];
                            if (lnk) { setImgSrc(lnk.href); }
                            else { setFallback(true); }
                        })
                        .catch(function() { setFallback(true); });
                } else {
                    setFallback(true);
                }
            };

            if (fallback) {
                return (
                    <div className="w-full h-full flex items-center justify-center bg-gradient-to-br from-primary-container/30 to-surface-container-lowest">
                        <div className="text-center p-6">

                            <p className="font-headline text-primary text-lg">{apod.title}</p>
                        </div>
                    </div>
                );
            }
            return <img src={imgSrc} alt={apod.title} className="w-full h-full object-cover" referrerPolicy="no-referrer" onError={onError} loading="lazy" />;

                                신호 수신 중...
                            </div>
                        )}

                        {error && (
                            <div className="bg-error-container/20 border border-error/30 rounded-sm px-4 py-3 text-error font-label text-sm mb-6">
                                {error === 'NASA_KEY_MISSING' ? 'NASA API 키를 먼저 설정해주세요.' : `오류: ${error}`}
                            </div>
                        )}

                        {apod && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-7">
                                    <div className="aspect-video overflow-hidden rounded-xl bg-surface-container-lowest relative">

                                            <iframe src={apod.url} className="w-full h-full" allowFullScreen title={apod.title}></iframe>
                                        ) : (
                                            <ApodImage apod={apod} />
                                        )}
                                        <div className="absolute top-4 left-4">
                                            <span className="bg-primary/20 backdrop-blur-md text-primary font-label text-[9px] px-2 py-0.5 border border-primary/30 uppercase tracking-tighter">{apod.date}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-5 space-y-6">
                                    <div>
                                        <p className="font-label text-[10px] uppercase tracking-widest text-secondary-fixed mb-2">제목</p>
                                        <h3 className="font-headline text-2xl font-bold text-on-surface mb-1">{apod.title}</h3>
                                        {apod.copyright && <p className="font-label text-[9px] text-outline">© {apod.copyright}</p>}
                                    </div>
                                    <div className="border-l-2 border-primary/20 pl-4">
                                        <p className="font-label text-[10px] uppercase tracking-widest text-secondary-fixed mb-2">원문 설명</p>
                                        <p className="font-body text-sm text-on-surface-variant leading-relaxed">{apod.explanation}</p>
                                    </div>
                                    {commentary && (
                                        <div className="bg-primary/5 border border-primary/20 rounded-sm p-4">
                                            <p className="font-label text-[10px] uppercase tracking-widest text-primary mb-2 flex items-center gap-1">
                                                <span className="material-symbols-outlined text-sm">smart_toy</span>
                                                AI 해설
                                            </p>
                                            <p className="font-body text-sm text-on-surface leading-relaxed">{commentary}</p>
                                        </div>
                                    )}
                                    <button onClick={generateCommentary} disabled={commentaryLoading} className="flex items-center gap-2 px-5 py-2.5 bg-surface-container-high border border-primary/30 text-primary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:bg-surface-bright transition-all disabled:opacity-50 active:scale-95">
                                        <span className="material-symbols-outlined text-sm">{commentaryLoading ? 'hourglass_empty' : 'translate'}</span>
                                        {commentaryLoading ? '해설 생성 중...' : '✦ AI 한국어 해설 생성'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {!loading && !apod && !error && (
                            <div className="text-center py-16">
                                <span className="material-symbols-outlined text-5xl text-on-surface-variant/30 block mb-4">rocket_launch</span>
                                <p className="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">API 키를 설정하고 탐사를 시작하세요</p>
                            </div>
                        )}
                    </section>

                    <section className="px-8 pb-24 max-w-7xl mx-auto border-t border-outline-variant/10 pt-16">
                        <div className="flex items-center gap-3 mb-4">
                            <h2 className="font-headline text-3xl font-bold text-on-surface">내 생일의 우주</h2>
                            <span className="font-headline text-base text-on-surface-variant/40 font-light">Birthday Universe</span>
                            <span className="font-label text-[9px] text-tertiary border border-tertiary/30 px-2 py-0.5 uppercase tracking-widest">Birthday Space</span>
                        </div>
                        <p className="font-body text-on-surface-variant mb-8 max-w-md">당신이 태어난 날, 우주는 어떤 모습이었을까요? 날짜를 입력하면 그날의 우주 사진과 생일 메시지를 드립니다.</p>

                        <div className="flex flex-wrap gap-3 items-end mb-3">
                            <div>
                                <label className="font-label text-[10px] uppercase tracking-widest text-secondary-fixed block mb-2">날짜 입력</label>
                                <input type="date" value={birthDate} onChange={e => setBirthDate(e.target.value)} min="1995-06-16" max={new Date().toISOString().split('T')[0]} className="bg-surface-container-lowest border border-outline-variant/30 text-on-surface rounded-sm px-4 py-2.5 font-label text-sm focus:outline-none focus:border-primary/50 [color-scheme:dark]" />
                            </div>
                            <button onClick={loadBirthdayApod} disabled={birthdayLoading || !birthDate} className="flex items-center gap-2 px-6 py-2.5 bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:opacity-90 transition-opacity disabled:opacity-40 active:scale-95">
                                <span className="material-symbols-outlined text-sm">travel_explore</span>
                                {birthdayLoading ? '탐색 중...' : '우주 탐색'}
                            </button>
                        </div>
                        <p className="font-label text-[9px] text-outline mb-8">* NASA APOD는 1995년 6월 16일부터 제공됩니다</p>

                        {birthdayError && (
                            <div className="bg-error-container/20 border border-error/30 rounded-sm px-4 py-3 text-error font-label text-sm mb-6">
                                {birthdayError}
                            </div>
                        )}

                        {birthdayApod && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-7">
                                    <div className="aspect-video overflow-hidden rounded-xl bg-surface-container-lowest relative">
                                        {birthdayApod.media_type === 'video' ? (
                                            <iframe src={birthdayApod.url} className="w-full h-full" allowFullScreen title={birthdayApod.title}></iframe>
                                        ) : (
                                            <ApodImage apod={birthdayApod} />
                                        )}
                                        <div className="absolute top-4 left-4 flex gap-2">
                                            <span className="bg-tertiary/20 backdrop-blur-md text-tertiary font-label text-[9px] px-2 py-0.5 border border-tertiary/30 uppercase tracking-tighter">{birthdayApod.date}</span>
                                            <span className="bg-surface-container/80 backdrop-blur-md text-secondary-fixed font-label text-[9px] px-2 py-0.5 border border-secondary-fixed/20 uppercase tracking-tighter">그날의 우주</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-5 space-y-6">
                                    <div>
                                        <p className="font-label text-[10px] uppercase tracking-widest text-tertiary mb-2">그날의 우주</p>
                                        <h3 className="font-headline text-2xl font-bold text-on-surface mb-1">{birthdayApod.title}</h3>
                                        {birthdayApod.copyright && <p className="font-label text-[9px] text-outline">© {birthdayApod.copyright}</p>}
                                    </div>
                                    <div className="border-l-2 border-tertiary/20 pl-4">
                                        <p className="font-body text-sm text-on-surface-variant leading-relaxed">{birthdayApod.explanation}</p>
                                    </div>
                                    {birthdayMsg && (
                                        <div className="bg-tertiary/5 border border-tertiary/20 rounded-sm p-4">
                                            <p className="font-label text-[10px] uppercase tracking-widest text-tertiary mb-2 flex items-center gap-1">
                                                <span className="material-symbols-outlined text-sm">celebration</span>
                                                AI 생일 메시지
                                            </p>
                                            <p className="font-body text-sm text-on-surface leading-relaxed">{birthdayMsg}</p>
                                        </div>
                                    )}
                                    <button onClick={generateBirthdayMsg} disabled={birthdayMsgLoading} className="flex items-center gap-2 px-5 py-2.5 bg-surface-container-high border border-tertiary/30 text-tertiary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:bg-surface-bright transition-all disabled:opacity-50 active:scale-95">
                                        <span className="material-symbols-outlined text-sm">{birthdayMsgLoading ? 'hourglass_empty' : 'celebration'}</span>
                                        {birthdayMsgLoading ? '메시지 생성 중...' : '생일 메시지 생성'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </section>
                </main>
            );
        };

        const PricingPage = () => (
            <main className="min-h-screen px-8 py-16 max-w-7xl mx-auto">
                <header className="mb-16 text-center">
                    <p className="font-label text-secondary text-[10px] tracking-[0.2em] uppercase mb-2">접근 등급</p>
                    <h1 className="font-headline text-5xl font-bold text-on-background tracking-tighter mb-4">우주 탐사 요금제</h1>
                    <p className="font-body text-on-surface-variant max-w-lg mx-auto">당신의 탐사 수준에 맞는 아카이브 접근 권한을 선택하세요.</p>
                </header>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-surface-container-low border border-outline-variant/10 rounded-xl p-8 flex flex-col gap-6">
                        <div>
                            <p className="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2">탐색자</p>
                            <p className="font-headline text-4xl font-bold text-on-surface">무료</p>
                        </div>
                        <ul className="space-y-3 flex-grow">
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>오늘의 우주 사진</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>기본 아카이브 접근</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-outline">close</span>AI 한국어 해설</li>
                        </ul>
                        <button className="w-full px-6 py-3 border border-outline-variant/30 text-primary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:bg-surface-container-high transition-colors">시작하기</button>
                    </div>
                    <div className="bg-surface-container border border-primary/30 rounded-xl p-8 flex flex-col gap-6 relative">
                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-primary text-on-primary font-label text-[9px] uppercase tracking-widest rounded-full">추천</div>
                        <div>
                            <p className="font-label text-[10px] uppercase tracking-widest text-secondary-fixed mb-2">항성계</p>
                            <p className="font-headline text-4xl font-bold text-primary">₩9,900<span className="text-base font-light text-on-surface-variant">/월</span></p>
                        </div>
                        <ul className="space-y-3 flex-grow">
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>탐색자 플랜 전체</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>AI 한국어 해설 무제한</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>생일 우주 탐색</li>
                        </ul>
                        <button className="w-full px-6 py-3 bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:opacity-90 transition-opacity">탐사 시작</button>
                    </div>
                    <div className="bg-surface-container-low border border-outline-variant/10 rounded-xl p-8 flex flex-col gap-6">
                        <div>
                            <p className="font-label text-[10px] uppercase tracking-widest text-tertiary mb-2">은하단</p>
                            <p className="font-headline text-4xl font-bold text-on-surface">₩29,900<span className="text-base font-light text-on-surface-variant">/월</span></p>
                        </div>
                        <ul className="space-y-3 flex-grow">
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>항성계 플랜 전체</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>전체 아카이브 무제한</li>
                            <li className="flex items-center gap-2 font-body text-sm text-on-surface-variant"><span className="material-symbols-outlined text-sm text-secondary">check</span>우선 지원</li>
                        </ul>
                        <button className="w-full px-6 py-3 border border-tertiary/30 text-tertiary font-label font-bold text-xs uppercase tracking-widest rounded-sm hover:bg-surface-container-high transition-colors">문의하기</button>
                    </div>
                </div>
            </main>
        );

        const App = () => {
            return (
                <BrowserRouter>
                    <Nav />
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/today" element={<CosmosToday />} />
                        <Route path="/birthday-universe" element={<CosmosToday />} />
                        <Route path="/archive" element={<ArchivePage />} />
                        <Route path="/stars" element={<MyStarSystemPage />} />
                        <Route path="/detail" element={<DetailPage />} />
                        <Route path="/pricing" element={<PricingPage />} />
                    </Routes>
                    <Footer />
                </BrowserRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
